definitions:
  financial_control_internal_features_categories.CategoryResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      type:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  financial_control_internal_features_user.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      login:
        type: string
      name:
        type: string
    type: object
  internal_auth.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  internal_auth.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/financial_control_internal_features_user.UserResponse'
    type: object
  internal_auth.RefreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  internal_features_analytics.CategoryUsageDTO:
    properties:
      category:
        type: string
      total:
        format: float64
        type: number
    type: object
  internal_features_analytics.DailyExpenseDTO:
    properties:
      day:
        type: integer
      total:
        format: float64
        type: number
    type: object
  internal_features_analytics.DashboardDTO:
    properties:
      balance:
        type: number
      daily_expenses:
        items:
          $ref: '#/definitions/internal_features_analytics.DailyExpenseDTO'
        type: array
      expenses:
        type: number
      income:
        type: number
      top_categories:
        items:
          $ref: '#/definitions/internal_features_analytics.CategoryUsageDTO'
        type: array
    type: object
  internal_features_categories.Category:
    properties:
      createdAt:
        type: string
      id:
        format: int64
        type: integer
      name:
        type: string
      type:
        type: string
      updatedAt:
        type: string
      userID:
        format: int64
        type: integer
    type: object
  internal_features_categories.CategoryRequest:
    properties:
      name:
        type: string
      type:
        type: string
    required:
    - name
    - type
    type: object
  internal_features_transaction.Frequency:
    enum:
    - fixed
    - variable
    type: string
    x-enum-varnames:
    - Fixed
    - Variable
  internal_features_transaction.SummaryDTO:
    properties:
      balance:
        type: number
      total_expense:
        type: number
      total_income:
        type: number
    type: object
  internal_features_transaction.TransactionRequest:
    properties:
      amount:
        type: number
      category_id:
        type: integer
      frequency:
        $ref: '#/definitions/internal_features_transaction.Frequency'
      installment_total:
        type: integer
      title:
        type: string
      transaction_date:
        type: string
      type:
        $ref: '#/definitions/internal_features_transaction.Type'
    required:
    - amount
    - title
    - type
    type: object
  internal_features_transaction.TransactionResponse:
    properties:
      amount:
        type: number
      category:
        $ref: '#/definitions/financial_control_internal_features_categories.CategoryResponse'
      created_at:
        type: string
      frequency:
        $ref: '#/definitions/internal_features_transaction.Frequency'
      id:
        type: integer
      installment_number:
        type: integer
      installment_plan_id:
        type: integer
      installment_total:
        type: integer
      installment_value:
        type: number
      title:
        type: string
      transaction_date:
        type: string
      type:
        $ref: '#/definitions/internal_features_transaction.Type'
      updated_at:
        type: string
    type: object
  internal_features_transaction.Type:
    enum:
    - income
    - expense
    type: string
    x-enum-varnames:
    - Income
    - Expense
  internal_features_user.CreateUserRequest:
    properties:
      email:
        type: string
      login:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  internal_features_user.User:
    properties:
      email:
        type: string
      id:
        type: integer
      login:
        type: string
      name:
        type: string
    type: object
  internal_features_user.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      login:
        type: string
      name:
        type: string
    type: object
info:
  contact: {}
  title: Financial Control API
  version: "1.0"
paths:
  /analytics/dashboard:
    get:
      description: Retorna resumo financeiro e analytics do mês
      parameters:
      - description: Mês (1-12)
        in: query
        name: month
        type: integer
      - description: 'Ano (ex: 2026)'
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_features_analytics.DashboardDTO'
      security:
      - BearerAuth: []
      summary: Dashboard financeiro
      tags:
      - Analytics
  /auth/login:
    post:
      consumes:
      - application/json
      description: Autentica o usuário e retorna JWT
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login de usuário
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: atualiza o token do usuario com nova data de expieração
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh do token do usuario
      tags:
      - Auth
  /category:
    get:
      description: Retorna todas as categorias disponíveis para o usuário (categorias
        próprias + categorias padrão do sistema)
      parameters:
      - description: "1"
        in: query
        name: page
        type: integer
      - description: "10"
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_features_categories.Category'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Listar categorias
      tags:
      - Categories
    post:
      consumes:
      - application/json
      description: Cria uma nova categoria personalizada para o usuário
      parameters:
      - description: Dados da categoria
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/internal_features_categories.CategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_features_categories.Category'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Criar categoria
      tags:
      - Categories
  /category/{id}:
    delete:
      description: Remove uma categoria criada pelo usuário
      parameters:
      - description: ID da categoria
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Deletar categoria
      tags:
      - Categories
    get:
      description: Retorna uma categoria pelo ID
      parameters:
      - description: ID da categoria
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_features_categories.Category'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Buscar categoria
      tags:
      - Categories
    put:
      consumes:
      - application/json
      description: Atualiza uma categoria criada pelo usuário
      parameters:
      - description: ID da categoria
        in: path
        name: id
        required: true
        type: integer
      - description: Dados atualizados da categoria
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/internal_features_categories.CategoryRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Atualizar categoria
      tags:
      - Categories
  /register:
    post:
      consumes:
      - application/json
      description: Cria um novo usuário no sistema
      parameters:
      - description: User data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_user.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Criar usuário
      tags:
      - Users
  /transaction:
    get:
      description: Retorna todas as transações
      parameters:
      - description: "1"
        in: query
        name: page
        type: integer
      - description: "10"
        in: query
        name: limit
        type: integer
      - description: Mês (1-12)
        in: query
        name: month
        type: integer
      - description: 'Ano (ex: 2026)'
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_features_transaction.TransactionResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Lista transações
      tags:
      - Transactions
    post:
      consumes:
      - application/json
      description: Cria uma nova transação no sistema
      parameters:
      - description: Transaction data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_transaction.TransactionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Criar transação
      tags:
      - Transactions
  /transaction/{id}:
    delete:
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Deletar transação
      tags:
      - Transactions
    get:
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_features_transaction.TransactionResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Buscar transação por ID
      tags:
      - Transactions
    put:
      consumes:
      - application/json
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      - description: Transaction data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_transaction.TransactionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Atualizar transação
      tags:
      - Transactions
  /transaction/summary:
    get:
      parameters:
      - description: Mês (1-12)
        in: query
        name: month
        type: integer
      - description: 'Ano (ex: 2026)'
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_features_transaction.SummaryDTO'
      security:
      - BearerAuth: []
      summary: Resumo das transações
      tags:
      - Transactions
  /user:
    get:
      description: Retorna todos os usuários
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_features_user.UserResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Lista usuários
      tags:
      - Users
  /user/{id}:
    delete:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Deletar usuário
      tags:
      - Users
    get:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_features_user.UserResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Buscar usuário por ID
      tags:
      - Users
    put:
      consumes:
      - application/json
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: User data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_user.User'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Atualizar usuário
      tags:
      - Users
  /user/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_features_user.UserResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Retorna usuário logado
      tags:
      - Users
securityDefinitions:
  BearerAuth:
    description: API para controle financeiro
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
